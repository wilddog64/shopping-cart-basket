apiVersion: apps/v1
kind: Deployment
metadata:
  name: basket-service
  labels:
    app.kubernetes.io/name: basket-service
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: shopping-cart
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: basket-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: basket-service
        app.kubernetes.io/component: service
        app.kubernetes.io/part-of: shopping-cart
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8083"
        prometheus.io/path: "/metrics"
        # Restart pod when redis-cart-secret changes (for password rotation)
        # Update this checksum after rotating Redis password
        checksum/redis-secret: "change-me-on-rotation"
    spec:
      serviceAccountName: basket-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: basket-service
          image: shopping-cart-basket:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
          env:
            - name: SERVER_PORT
              value: "8083"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: basket-service-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: basket-service-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-cart-secret
                  key: password
                  optional: true
            - name: CART_TTL
              valueFrom:
                configMapKeyRef:
                  name: basket-service-config
                  key: CART_TTL
            - name: OAUTH2_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: basket-service-config
                  key: OAUTH2_ENABLED
            - name: OAUTH2_ISSUER_URI
              valueFrom:
                configMapKeyRef:
                  name: basket-service-config
                  key: OAUTH2_ISSUER_URI
                  optional: true
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: basket-service-config
                  key: RABBITMQ_HOST
                  optional: true
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: basket-service-config
                  key: LOG_LEVEL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: basket-service
                topologyKey: kubernetes.io/hostname
