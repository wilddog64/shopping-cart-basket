name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Download dependencies
        run: go mod download
      - name: Run tests
        run: go test -v ./...

  publish:
    name: Publish
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: wilddog64/shopping-cart-infra/.github/workflows/build-push-deploy.yml@981008c46c2fd1462c32a4ae51c561c60ee13042
    with:
      service-name: shopping-cart-basket
      image-name: ghcr.io/wilddog64/shopping-cart-basket
    permissions:
      contents: write
      packages: write
